{% extends "base.html" %}
{% block title %}{{ action }} Supplier | BizManager{% endblock %}
{% block page_title %}{{ action }} Supplier{% endblock %}

{% block content %}
<div class="card" style="max-width:620px;margin:auto">
  <div class="card-header"><h2>{{ '➕' if action=='Add' else '✏️' }} {{ action }} Supplier</h2></div>
  <div class="card-body">
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

      <div class="form-group">
        <label>Supplier / Company Name *</label>
        <input type="text" name="name" class="form-control form-control-lg"
               value="{{ supplier.get('name','') }}" required autofocus>
      </div>

      <div class="form-row-2">
        <div class="form-group">
          <label>Phone</label>
          <input type="tel" name="phone" class="form-control" value="{{ supplier.get('phone','') }}">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" class="form-control" value="{{ supplier.get('email','') }}">
        </div>
      </div>

      <div class="form-group">
        <label>Address</label>
        <textarea name="address" class="form-control" rows="2">{{ supplier.get('address','') }}</textarea>
      </div>

      <div class="form-row-2">
        <div class="form-group">
          <label>GSTIN</label>
          <input type="text" name="gstin" class="form-control"
                 value="{{ supplier.get('gstin','') }}" placeholder="27AABCU9603R1ZX" maxlength="15">
        </div>
        <div class="form-group">
          <label>State (for GST)</label>
          <select name="state_code" class="form-control">
            <option value="">— Select State —</option>
            {% for code, name in states %}
            <option value="{{ code }}" {% if supplier.get('state_code','')==code %}selected{% endif %}>
              {{ code }} – {{ name }}
            </option>
            {% endfor %}
          </select>
        </div>
      </div>

      {% if action == 'Add' %}
      <div class="form-group">
        <label>Opening Balance (₹) <small class="text-muted">— amount we owe them at start</small></label>
        <input type="number" name="opening_balance" class="form-control"
               value="{{ supplier.get('opening_balance',0) }}" min="0" step="0.01">
      </div>
      {% endif %}

      <div class="btn-row">
        <button type="submit" class="btn btn-primary btn-lg">
          {{ '➕ Add Supplier' if action=='Add' else '💾 Save Changes' }}
        </button>
        <a href="{{ url_for('saas_suppliers.index') }}" class="btn btn-secondary btn-lg">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
